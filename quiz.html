<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Nexus One</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0F0F0F;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.quiz-container{
width:100%;
max-width:800px;
background:#161616;
padding:40px;
border-radius:20px;
box-shadow:0 0 30px rgba(255,215,0,0.15);
}

.logo{
text-align:center;
font-size:32px;
font-weight:700;
color:#FFD700;
margin-bottom:20px;
}

.progress-container{
background:#222;
height:12px;
border-radius:10px;
overflow:hidden;
margin-bottom:30px;
}

.progress{
height:100%;
width:10%;
background:#FFD700;
transition:.4s;
}

.question-number{
color:#999;
margin-bottom:10px;
}

.question{
font-size:26px;
font-weight:600;
margin-bottom:25px;
}

.options{
display:flex;
flex-direction:column;
gap:15px;
}

.option{
background:#222;
padding:15px;
border-radius:12px;
cursor:pointer;
transition:.3s;
border:1px solid transparent;
}

.option:hover{
border-color:#FFD700;
transform:translateY(-2px);
}

.result{
display:none;
}

.result h2{
color:#FFD700;
margin-bottom:20px;
}

.result-box{
background:#222;
padding:20px;
border-radius:15px;
margin-top:15px;
}

</style>
</head>
<body>

<div class="quiz-container">

<div class="logo">Nexus One</div>

<div class="progress-container">
<div class="progress" id="progress"></div>
</div>

<div id="quiz">

<div class="question-number" id="questionNumber">
Pergunta 1 de 10
</div>

<div class="question" id="question"></div>

<div class="options" id="options"></div>

</div>

<div class="result" id="result">

<h2>Perfil Identificado</h2>

<div class="result-box">
<h3 id="perfil"></h3>
<p id="descricao"></p>
</div>

</div>

</div>

<script>

const perguntas = [

{
q:"Qual sua idade?",
o:["Menos de 18","18-24","25-34","35+"]
},

{
q:"Quantas horas livres você tem por dia?",
o:["Menos de 1h","1-2h","2-4h","4h+"]
},

{
q:"Qual sua situação atual?",
o:["Estudante","CLT","Desempregado","Empreendedor"]
},

{
q:"Quanto você pode investir?",
o:["R$0","Até R$100","R$100-R$500","R$500+"]
},

{
q:"Qual seu principal objetivo?",
o:["Renda extra","Substituir emprego","Escalar negócio","Criar marca pessoal"]
},

{
q:"Você gosta de vender?",
o:["Muito","Um pouco","Não"]
},

{
q:"Você gosta de aparecer em vídeos?",
o:["Sim","Talvez","Não"]
},

{
q:"Qual sua habilidade mais forte?",
o:["Comunicação","Criatividade","Organização","Tecnologia"]
},

{
q:"Quanto tempo aceita esperar por resultados?",
o:["30 dias","3 meses","6 meses","1 ano+"]
},

{
q:"O que mais te impede hoje?",
o:["Falta de dinheiro","Falta de conhecimento","Falta de disciplina","Falta de direção"]
}

];

let atual = 0;
let respostas = [];

const question = document.getElementById("question");
const options = document.getElementById("options");
const progress = document.getElementById("progress");
const questionNumber = document.getElementById("questionNumber");

function carregarPergunta(){

question.innerText = perguntas[atual].q;

questionNumber.innerText =
`Pergunta ${atual+1} de ${perguntas.length}`;

progress.style.width =
((atual+1)/perguntas.length)*100 + "%";

options.innerHTML="";

perguntas[atual].o.forEach(opcao=>{

const btn = document.createElement("div");

btn.classList.add("option");

btn.innerText = opcao;

btn.onclick = ()=>responder(opcao);

options.appendChild(btn);

});

}

function responder(valor){

respostas.push(valor);

atual++;

if(atual < perguntas.length){

carregarPergunta();

}else{

function mostrarResultado(){

document.getElementById("quiz").style.display="none";
document.getElementById("result").style.display="block";

let perfil = "Freelancer Digital";
let linkCurso = "freelancer.html";

let descricao = `
Compatibilidade: 91%<br><br>

✓ Baixo investimento inicial<br>
✓ Possibilidade de primeiros ganhos rápidos<br>
✓ Alta demanda no mercado<br><br>

Desafios:<br>
⚠ Aprender prospecção<br>
⚠ Desenvolver disciplina diária<br><br>

Trilha recomendada:<br>
1. Marketing Digital<br>
2. Captação de Clientes<br>
3. Vendas<br>
4. Freelancer<br>
5. Escala
`;

if(respostas.includes("Criar marca pessoal")){

perfil = "Criador de Conteúdo";
linkCurso = "conteudo.html";

descricao = `
Compatibilidade: 89%<br><br>

✓ Potencial de longo prazo<br>
✓ Construção de audiência<br>
✓ Monetização escalável<br><br>

Desafios:<br>
⚠ Consistência<br>
⚠ Crescimento gradual<br><br>

Trilha recomendada:<br>
1. Marketing Digital<br>
2. Conteúdo<br>
3. Crescimento<br>
4. Monetização<br>
5. Escala
`;

}

document.getElementById("perfil").innerHTML = perfil;

document.getElementById("descricao").innerHTML =
descricao +
`
<br><br>

<a href="${linkCurso}"
style="
background:#FFD700;
color:black;
padding:14px 25px;
border-radius:10px;
text-decoration:none;
font-weight:600;
display:inline-block;
">
🚀 Acessar Minha Trilha
</a>
`;

}

}

}

function mostrarResultado(){

document.getElementById("quiz").style.display="none";

document.getElementById("result").style.display="block";

let perfil = "Freelancer Digital";

let descricao = `
Compatibilidade: 91%<br><br>

✓ Baixo investimento inicial<br>
✓ Possibilidade de primeiros ganhos rápidos<br>
✓ Alta demanda no mercado<br><br>

Desafios:<br>
⚠ Aprender prospecção<br>
⚠ Desenvolver disciplina diária<br><br>

Plano recomendado:<br>
1. Escolher um serviço<br>
2. Criar portfólio simples<br>
3. Fazer contatos diariamente
`;

if(respostas.includes("Criar marca pessoal")){

perfil = "Criador de Conteúdo";

descricao = `
Compatibilidade: 89%<br><br>

✓ Potencial de longo prazo<br>
✓ Construção de audiência<br>
✓ Monetização escalável<br><br>

Desafios:<br>
⚠ Consistência<br>
⚠ Crescimento gradual
`;

}

document.getElementById("perfil").innerHTML = perfil;
document.getElementById("descricao").innerHTML = descricao;

}

carregarPergunta();

</script>

</body>
</html>
