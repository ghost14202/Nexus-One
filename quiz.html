<!DOCTYPE html>
<html>
<head>
<title>Quiz Nexus One</title>
<style>
body{
background:#0F0F0F;
color:white;
font-family:Arial;
padding:40px;
}
button{
padding:10px 20px;
margin:10px;
cursor:pointer;
}
#resultado{
margin-top:30px;
font-size:24px;
color:#FFD700;
}
</style>
</head>
<body>

<h1>Quiz Nexus One</h1>

<h2>Qual caminho digital combina com você?</h2>

<select id="objetivo">
<option>Dinheiro rápido</option>
<option>Construir negócio</option>
<option>Criar audiência</option>
</select>

<br><br>

<button onclick="analisar()">
Ver Resultado
</button>

<div id="resultado"></div>

<script>
function analisar(){

let objetivo =
document.getElementById("objetivo").value;

let resultado = "";

if(objetivo == "Dinheiro rápido"){
resultado = "Freelancer";
}
else if(objetivo == "Construir negócio"){
resultado = "Gestor de Tráfego";
}
else{
resultado = "Criador de Conteúdo";
}

document.getElementById("resultado").innerHTML =
"Seu perfil ideal: " + resultado;

}
</script>

</body>
</html>
