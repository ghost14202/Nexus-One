```html
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus One - Quiz Profissional</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0F0F0F;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.quiz-container{
width:100%;
max-width:900px;
background:#161616;
padding:40px;
border-radius:25px;
box-shadow:0 0 40px rgba(255,215,0,.15);
}

.logo{
text-align:center;
font-size:38px;
font-weight:700;
color:#FFD700;
margin-bottom:20px;
}

.subtitle{
text-align:center;
color:#999;
margin-bottom:30px;
}

.progress-container{
height:12px;
background:#222;
border-radius:50px;
overflow:hidden;
margin-bottom:30px;
}

.progress{
height:100%;
width:0%;
background:#FFD700;
transition:.4s;
}

.question-number{
color:#888;
margin-bottom:10px;
}

.question{
font-size:28px;
font-weight:600;
margin-bottom:25px;
}

.options{
display:flex;
flex-direction:column;
gap:15px;
}

.option{
background:#222;
padding:18px;
border-radius:14px;
cursor:pointer;
transition:.3s;
}

.option:hover{
background:#2A2A2A;
border-left:5px solid #FFD700;
transform:translateX(5px);
}

.result{
display:none;
}

.result h2{
color:#FFD700;
margin-bottom:15px;
}

.result-card{
background:#222;
padding:25px;
border-radius:15px;
margin-top:20px;
}

.btn{
display:inline-block;
margin-top:20px;
background:#FFD700;
color:black;
padding:14px 25px;
border-radius:12px;
font-weight:600;
text-decoration:none;
}

.btn:hover{
opacity:.9;
}

</style>
</head>
<body>

<div class="quiz-container">

<div class="logo">Nexus One</div>

<div class="subtitle">
Descubra qual caminho digital combina com você.
</div>

<div class="progress-container">
<div class="progress" id="progress"></div>
</div>

<div id="quiz">

<div class="question-number" id="questionNumber"></div>

<div class="question" id="question"></div>

<div class="options" id="options"></div>

</div>

<div class="result" id="result">

<h2>Perfil Identificado</h2>

<div class="result-card">

<h3 id="perfil"></h3>

<br>

<div id="descricao"></div>

<a id="cursoBtn" class="btn">
🚀 Acessar Minha Trilha
</a>

</div>

</div>

</div>

<script>

const perguntas = [

{
q:"Qual sua idade?",
o:["Menos de 18","18-24","25-34","35+"]
},

{
q:"Quantas horas livres você possui diariamente?",
o:["Menos de 1h","1-2h","2-4h","4h+"]
},

{
q:"Sua situação atual?",
o:["Estudante","CLT","Desempregado","Empreendedor"]
},

{
q:"Quanto pode investir?",
o:["R$0","Até R$100","Até R$500","Mais de R$500"]
},

{
q:"Qual seu objetivo principal?",
o:["Renda extra","Substituir emprego","Escalar negócio","Criar marca pessoal"]
},

{
q:"Você gosta de vender?",
o:["Sim","Um pouco","Não"]
},

{
q:"Você gosta de criar conteúdo?",
o:["Sim","Talvez","Não"]
},

{
q:"Qual habilidade mais forte?",
o:["Comunicação","Criatividade","Organização","Tecnologia"]
},

{
q:"Quanto tempo aceita esperar por resultados?",
o:["30 dias","3 meses","6 meses","1 ano+"]
},

{
q:"O que mais te trava hoje?",
o:["Dinheiro","Conhecimento","Disciplina","Direção"]
}

];

let atual = 0;
let respostas = [];

const question = document.getElementById("question");
const options = document.getElementById("options");
const progress = document.getElementById("progress");
const questionNumber = document.getElementById("questionNumber");

function carregarPergunta(){

const p = perguntas[atual];

question.innerText = p.q;

questionNumber.innerText =
`Pergunta ${atual+1} de ${perguntas.length}`;

progress.style.width =
((atual)/perguntas.length)*100 + "%";

options.innerHTML="";

p.o.forEach(opcao=>{

const div = document.createElement("div");

div.classList.add("option");

div.innerText = opcao;

div.onclick = () => responder(opcao);

options.appendChild(div);

});

}

function responder(valor){

respostas.push(valor);

atual++;

if(atual < perguntas.length){

carregarPergunta();

}else{

mostrarResultado();

}

}

function mostrarResultado(){

document.getElementById("quiz").style.display="none";

document.getElementById("result").style.display="block";

progress.style.width="100%";

let perfil = "Freelancer Digital";
let curso = "freelancer.html";

let descricao = `
<b>Compatibilidade:</b> 91%<br><br>

✅ Baixo investimento inicial<br>
✅ Primeiros resultados rápidos<br>
✅ Alta demanda de mercado<br><br>

<b>Trilha Recomendada:</b><br>
1. Marketing Digital<br>
2. Captação de Clientes<br>
3. Vendas<br>
4. Freelancer<br>
5. Escala
`;

if(respostas.includes("Criar marca pessoal")){

perfil = "Criador de Conteúdo";

curso = "conteudo.html";

descricao = `
<b>Compatibilidade:</b> 89%<br><br>

✅ Construção de audiência<br>
✅ Crescimento de longo prazo<br>
✅ Monetização escalável<br><br>

<b>Trilha Recomendada:</b><br>
1. Marketing Digital<br>
2. Conteúdo<br>
3. Crescimento<br>
4. Monetização<br>
5. Escala
`;

}

document.getElementById("perfil").innerHTML = perfil;

document.getElementById("descricao").innerHTML = descricao;

document.getElementById("cursoBtn").href = curso;

}

carregarPergunta();

</script>

</body>
</html>
```
