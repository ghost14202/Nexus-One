<!DOCTYPE html>
<html>
<head>
<title>Cadastro - Nexus One</title>
<style>
body{
background:#0F0F0F;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}
.box{
background:#161616;
padding:30px;
border-radius:10px;
width:300px;
}
input,button{
width:100%;
padding:10px;
margin-top:10px;
}
button{
background:#FFD700;
border:none;
cursor:pointer;
}
</style>
</head>
<body>

<div class="box">
<h2>Criar Conta</h2>

<input placeholder="Nome">

<input type="email" placeholder="Email">

<input type="password" placeholder="Senha">

<button>Cadastrar</button>

</div>

</body>
</html>
